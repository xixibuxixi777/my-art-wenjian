<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轩韵摄影 · 注册</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .register-container {
            max-width: 560px;
            margin: 3rem auto;
            background: white;
            border-radius: 48px;
            padding: 2.5rem;
            box-shadow: var(--shadow-sm);
        }
        h2 { text-align: center; color: #5a3e2b; margin-bottom: 1.8rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.4rem; color: #4a3a2c; }
        input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid #e2d4c6;
            border-radius: 48px;
            font-size: 1rem;
            background: #fefcfa;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #d49c6c;
            box-shadow: 0 0 0 3px rgba(212,156,108,0.2);
        }
        .error-msg { color: #c25d3a; font-size: 0.8rem; margin-top: 0.3rem; padding-left: 1rem; }
        button {
            background: #b87c4d;
            color: white;
            border: none;
            width: 100%;
            padding: 0.9rem;
            border-radius: 48px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #9b623a; transform: scale(0.98); }
        .success { background: #dfedd8; color: #2a6130; padding: 0.8rem; border-radius: 60px; text-align: center; margin-top: 1rem; }
        .error-box { background: #ffe3dc; color: #b1421a; padding: 0.8rem; border-radius: 60px; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="nav-container"><div class="logo">
        岛岛摄影展2026</div><ul class="nav-links"><li><a href="index.html">首页
        </a></li><li><a href="gallery.html">作品集
        </a></li><li><a href="artists.html">摄影家
        </a></li><li><a href="register.html">注册
        </a></li><li><a href="about.html">关于</a></li></ul></div></nav>

    <div class="register-container">
        <h2>加入岛岛摄影展2026注册</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="3~16位字母数字下划线">
                <div class="error-msg" id="userError"></div>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="至少6位">
                <div class="error-msg" id="pwdError"></div>
            </div>
            <div class="form-group">
                <label>电子邮箱</label>
                <input type="email" id="email" placeholder="example@domain.com">
                <div class="error-msg" id="emailError"></div>
            </div>
            <button type="button" id="registerBtn">立即注册</button>
            <div id="formResult"></div>
        </form>
    </div>

    <footer><p>© 2025 岛岛摄影展2026 | 灵感与才华的栖息地</p></footer>

    <script src="common.js"></script>
    <script>
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const emailInput = document.getElementById('email');
        const userErr = document.getElementById('userError');
        const pwdErr = document.getElementById('pwdError');
        const emailErr = document.getElementById('emailError');
        const resultDiv = document.getElementById('formResult');

        function validateForm() {
            let valid = true;
            const userMsg = validateUsername(usernameInput.value.trim());
            const pwdMsg = validatePassword(passwordInput.value.trim());
            const emailMsg = validateEmail(emailInput.value.trim());
            userErr.innerText = userMsg || '';
            pwdErr.innerText = pwdMsg || '';
            emailErr.innerText = emailMsg || '';
            if (userMsg || pwdMsg || emailMsg) valid = false;
            return valid;
        }

        function validateUsername(v) {
            if (!v) return '请输入用户名';
            if (!/^[a-zA-Z0-9_]{3,16}$/.test(v)) return '用户名需为3~16位字母、数字或下划线';
            return '';
        }

        function validatePassword(v) {
            if (!v) return '请输入密码';
            if (v.length < 6) return '密码至少6位';
            return '';
        }

        function validateEmail(v) {
            if (!v) return '请输入电子邮箱';
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!re.test(v)) return '请输入有效的邮箱地址';
            return '';
        }

        document.getElementById('registerBtn').addEventListener('click', () => {
            if (validateForm()) {
                resultDiv.innerHTML = '<div class="success">注册成功，欢迎加入。</div>';
            } else {
                resultDiv.innerHTML = '<div class="error-box">请正确填写所有字段。</div>';
            }
        });
    </script>
    </body>
    </html>
