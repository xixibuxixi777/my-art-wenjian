<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轩韵摄影 · 作品集</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* 瀑布流布局 */
        .masonry {
            column-count: 3;
            column-gap: 1.8rem;
        }
        .artwork {
            break-inside: avoid;
            margin-bottom: 1.8rem;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .artwork:hover {
            transform: scale(1.01);
            box-shadow: var(--shadow-hover);
        }
        .artwork-img {
            width: 100%;
            display: block;
            background-color: #d9cdbc;
        }
        .artwork-info { padding: 1rem; }
        @media (max-width: 800px) { .masonry { column-count: 2; } }
        @media (max-width: 500px) { .masonry { column-count: 1; } }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            color: #7a583a;
            border-left: 6px solid var(--accent);
            padding-left: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar"><div class="nav-container"><div class="logo">岛岛摄影展2026</div><ul class="nav-links"><li><a href="index.html">首页</a></li><li><a href="gallery.html">作品集</a></li><li><a href="artists.html">摄影家</a></li><li><a href="register.html">注册</a></li><li><a href="about.html">关于</a></li></ul></div></nav>

    <div class="container">
        <h1>艺术作品集</h1>
        <div class="masonry">
            <div class="artwork"><img class="artwork-img" src="./tupian/fenjin06.jpg" alt="山水作品"><div class="artwork-info"><strong>《山色空蒙》</strong><br>水墨纸本</div></div>
            <div class="artwork"><img class="artwork-img" src="./tupian/fenjin04.jpg" alt="静物"><div class="artwork-info"><strong>《静物与果篮》</strong><br>油画</div></div>
            <div class="artwork"><img class="artwork-img" src="./tupian/fenjin03.jpg" alt="书法"><div class="artwork-info"><strong>《书法长卷》</strong><br>行草</div></div>
            <div class="artwork"><img class="artwork-img" src="./tupian/chenshifengjing.jpg" alt="城市幻影"><div class="artwork-info"><strong>《城市幻影》</strong><br>数字艺术</div></div>
            <div class="artwork"><img class="artwork-img" src="./tupian/chenwu.gif" alt="晨雾"><div class="artwork-info"><strong>《晨雾》</strong><br>水彩</div></div>
            <div class="artwork"><img class="artwork-img" src="./tupian/fenjin02.jpg" alt="雕塑"><div class="artwork-info"><strong>《雕塑·韵》</strong><br>树脂</div></div>
        </div>
