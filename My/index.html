<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轩韵摄影 · 首页</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* 首页特有样式：轮播 + 卡片网格 */
        .carousel {
            position: relative;
            max-width: 100%;
            margin-bottom: 3rem;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }
        .carousel-inner {
            display: flex;
            transition: transform 0.5s ease;
        }
        .carousel-item {
            min-width: 100%;
            height: 400px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 2rem;
            color: white;
        }
        .carousel-caption {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-size: 1.2rem;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            z-index: 2;
            transition: 0.2s;
        }
        .carousel-btn:hover { background: rgba(0,0,0,0.8); }
        .prev { left: 10px; }
        .next { right: 10px; }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .art-card {
            background: white;
            border-radius: var(--radius-card);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .art-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
        }
        .card-img {
            height: 200px;
            background-color: #ddd2c2;
            background-size: cover;
            background-position: center;
        }
        .card-content { padding: 1.2rem; }
        .section-title {
            text-align: center;
            font-size: 1.8rem;
            margin: 1rem 0 1.5rem;
            color: #7a583a;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">岛岛摄影展2026</div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="gallery.html">作品集</a></li>
                <li><a href="artists.html">摄影家</a></li>
                <li><a href="register.html">注册</a></li>
                <li><a href="about.html">关于</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="carousel" id="carousel">
            <div class="carousel-inner">
                <div class="carousel-item" style="background-image: linear-gradient(0deg,rgba(0,0,0,0.4),rgba(0,0,0,0.2)), url('./tupian/jin01.jpg');">
                    <div class="carousel-caption">水墨丹青 · 传统意境</div>
                </div>
                <div class="carousel-item" style="background-image: linear-gradient(0deg,rgba(0,0,0,0.4),rgba(0,0,0,0.2)), url('./tupian/jin02.jpg');">
                    <div class="carousel-caption">现代艺术 · 思潮涌动</div>
                </div>
                <div class="carousel-item" style="background-image: linear-gradient(0deg,rgba(0,0,0,0.4),rgba(0,0,0,0.2)), url('./tupian/jin03.jpg');">
                    <div class="carousel-caption">匠心手作 · 温暖时光</div>
                </div>
            </div>
            <button class="carousel-btn prev"><</button>
            <button class="carousel-btn next">></button>
        </div>

        <h2 class="section-title">精选艺作</h2>
        <div class="card-grid">
            <div class="art-card">
                <div class="card-img" style="background-image: url('./tupian/8aeb8dd13522b87c822e7e416a4f07c3.jpg');"></div>
                <div class="card-content"><h3>远山幽谷</h3><p>纸本水墨，意境深远。</p></div>
            </div>

                <div class="card-content"><h3>春风野渡</h3><p>水墨与现代交融的空间感。</p></div>
            </div>
            <div class="art-card">
                <div class="card-img" style="background-image: url('./tupian/f3f4e9361240f221f87dcc4e7a0cd729.jpg');"></div>
                <div class="card-content"><h3>静谧观景</h3><p>淡雅色彩，静中见动。</p></div>
            </div>
        </div>
    </div>

    <footer><p>©岛岛摄影展2026 | 视觉与感官共鸣</p></footer>

    <script src="common.js"></script>
</body>
</html>
