<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岛岛摄影展2026 · 摄影家</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .artist-hero {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-bottom: 3rem;
            background: #ffffffd9;
            border-radius: 48px;
            padding: 2rem;
            box-shadow: var(--shadow-sm);
        }
        .hero-text { flex: 1.2; }
        .hero-img {
            flex: 0.8;
            background: #dcc9b2;
            border-radius: 32px;
            background-image: url('./tupian/fenijn05.jpg');
            background-size: cover;
            background-position: center;
            min-height: 260px;
        }
        .artist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }
        .artist-card {
            background: white;
            border-radius: 32px;
            padding: 1.2rem;
            text-align: center;
            transition: 0.2s;
        }
        .artist-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            margin: 0 auto 1rem;
            background-size: cover;
            background-position: center;
        }
        h1 { font-size: 2rem; margin-bottom: 0.8rem; color: #8b5a2e; }
        .sub { color: #7e6954; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="nav-container"><div class="logo">
        岛岛摄影展2026</div><ul class="nav-links"><li><a href="index.html">首页
        </a></li><li><a href="gallery.html">作品集
        </a></li><li><a href="artists.html">摄影家
        </a></li><li><a href="register.html">注册
        </a></li><li><a href="about.html">关于
        </a></li></ul></div></nav>

    <div class="container">
        <div class="artist-hero">
            <div class="hero-text">
                <h1>驻留摄影家</h1>
                <p class="sub">岛岛摄影展2026汇聚多元创作力量，传统与现代交融。</p>
                <p>每一位摄影家都是独特灵魂的折射，从水墨、油画到数字艺术，他们以敏锐的感知和精湛技艺，表达对世界的思考。</p>
            </div>
            <div class="hero-img"></div>
        </div>
        <h2 style="margin: 1rem 0 0.5rem;">合作摄影家</h2>
        <div class="artist-grid">
            <div class="artist-card"><div class="avatar" style="background-image: url('./tupian/nan01.jpg');"></div><h3>林清</h3><p>天空 | 意象山水</p></div>
            <div class="artist-card"><div class="avatar" style="background-image: url('./tupian/nv01.jpg');"></div><h3>陈秋</h3><p>大海 | 金石韵味</p></div>
            <div class="artist-card"><div class="avatar" style="background-image: url('./tupian/nan02.jpg');"></div><h3>拾肆</h3><p>山水 | 奇幻叙事</p></div>
            <div class="artist-card"><div class="avatar" style="background-image: url('./tupian/nv02.jpg');"></div><h3>岛岛</h3><p>城市 | 情绪表达</p></div>
        </div>
    </div>
    <footer><p>© 岛岛摄影展2026 | 致敬创作者</p></footer>
</body>
</html>
